name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

  autofix:
    name: Auto-fix CI errors with Claude
    needs: ci
    if: |
      failure() &&
      !contains(github.event.head_commit.message, '[autofix]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get failed run logs
        id: logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.run_id }}"
          echo "Fetching logs for run $RUN_ID"
          gh run view "$RUN_ID" --log-failed --repo "${{ github.repository }}" > /tmp/ci-errors.txt 2>&1 || true
          echo "=== CI ERRORS ===" && cat /tmp/ci-errors.txt

      - name: Run Claude Code to fix errors
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ERRORS=$(cat /tmp/ci-errors.txt)
          claude --dangerously-skip-permissions -p "
          The GitHub Actions CI just failed on the covercare-thailand repo.
          Here are the error logs:

          $ERRORS

          Fix every error shown above directly in the source files in the current directory.
          After fixing, run: npm run lint && npm run build
          If both pass, stage all changed files and commit with message:
          'fix: auto-fix CI errors [autofix]'
          Do not push — just commit.
          "

      - name: Push fix if commit was made
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "claude-autofix[bot]"
          git config user.email "claude-autofix@users.noreply.github.com"
          # Only push if there's a new commit since checkout
          if git log --oneline origin/${{ github.ref_name }}..${{ github.ref_name }} | grep -q '\[autofix\]'; then
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Fix pushed"
          else
            echo "ℹ️ No autofix commit found — no push needed"
          fi
